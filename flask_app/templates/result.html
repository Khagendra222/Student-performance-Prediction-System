<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>
        <div class="result {% if 'PASS' in prediction %}pass{% else %}fail{% endif %}">
            
            <h1>{{ prediction }}</h1>
        </div>
        <p style="text-align:center; margin-top:20px;">
            <a href="{{ url_for('home') }}" style="color:#1a1a1a; font-weight:bold;">Go Back</a>
        </p>
    </div>
</body>
</html>
